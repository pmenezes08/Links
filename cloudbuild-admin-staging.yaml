# Cloud Build config for C.Point Admin Web - STAGING
# Use: gcloud builds submit --config=cloudbuild-admin-staging.yaml ./admin-web

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_API_BASE=https://cpoint-app-staging-739552904126.europe-west1.run.app'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cpoint-admin-staging:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cpoint-admin-staging:latest']
  - name: 'google/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cpoint-admin'
      - '--image=gcr.io/$PROJECT_ID/cpoint-admin-staging:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
