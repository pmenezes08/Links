# Cloud Build config for cpoint-app-staging
# Staging source of truth: the `staging` branch (not `main`; `main` is for production).
# From a clean checkout: git checkout staging && git pull
# Then: gcloud builds submit --config=cloudbuild.yaml .
# More reliable than gcloud run deploy --source (avoids gcloud streaming crash)

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cpoint-app-staging:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cpoint-app-staging:latest']
  - name: 'google/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cpoint-app-staging'
      - '--image=gcr.io/$PROJECT_ID/cpoint-app-staging:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--timeout=600'
      - '--cpu-boost'
      # Admin is a separate Cloud Run service; CSRF origin gate must allow its Origin header.
      - '--update-env-vars=CSRF_ALLOWED_ORIGINS=https://cpoint-admin-staging-739552904126.europe-west1.run.app'

options:
  # More CPU/memory for npm install (default can OOM)
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
