# Cloud Build config for cpoint-app (PRODUCTION)
# Use: gcloud builds submit --config=cloudbuild-production.yaml .
#
# This pipeline:
#   1. Builds and deploys the image
#   2. Re-applies Secret Manager bindings (image-only deploys must not drop them)
#   3. Runs production smoke checks (welcome_cards, health, session cookie)

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cpoint-app:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cpoint-app:latest']
  - name: 'google/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cpoint-app'
      - '--image=gcr.io/$PROJECT_ID/cpoint-app:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--timeout=600'
      - '--cpu-boost'
  - name: 'google/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed -i 's/\r$//' scripts/wire_prod_cloud_run_secrets.sh
        bash scripts/wire_prod_cloud_run_secrets.sh
  - name: 'google/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        sed -i 's/\r$//' scripts/smoke_prod.sh
        bash scripts/smoke_prod.sh

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
