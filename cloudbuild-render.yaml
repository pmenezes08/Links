# Cloud Build config for the cpoint-render headless-Chromium worker on Cloud Run.
# Build context is services/render (keeps the image lean — no repo/node_modules).
# Private service: requires the RENDER_SHARED_SECRET secret and no public access.
# Run from repo root: gcloud builds submit --config=cloudbuild-render.yaml .
#
# One-time prerequisites (see docs/DEPLOYMENT_INSTANCES.md):
#   gcloud secrets create render-shared-secret --data-file=- <<< "<random>"
#   (then bind the Cloud Run runtime SA to roles/secretmanager.secretAccessor)

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cpoint-render:latest', 'services/render']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cpoint-render:latest']
  - name: 'google/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cpoint-render'
      - '--image=gcr.io/$PROJECT_ID/cpoint-render:latest'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=120'
      - '--set-secrets=RENDER_SHARED_SECRET=render-shared-secret:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
