server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    # Static assets — long cache, immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy: /api/* → app.c-point.co/api/*
    location /api/ {
        proxy_pass https://app.c-point.co/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host app.c-point.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_domain .c-point.co $host;
        proxy_cookie_domain app.c-point.co $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # Reverse proxy: /login → app.c-point.co/login
    location = /login {
        proxy_pass https://app.c-point.co/login;
        proxy_ssl_server_name on;
        proxy_set_header Host app.c-point.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_domain .c-point.co $host;
        proxy_cookie_domain app.c-point.co $host;
    }

    # Reverse proxy: /login_password → app.c-point.co/login_password
    location = /login_password {
        proxy_pass https://app.c-point.co/login_password;
        proxy_ssl_server_name on;
        proxy_set_header Host app.c-point.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_domain .c-point.co $host;
        proxy_cookie_domain app.c-point.co $host;
    }

    # SPA fallback — no cache for HTML
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
