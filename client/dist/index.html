<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/cpoint-logo.png" />
    <link rel="shortcut icon" type="image/png" href="/static/cpoint-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="dark">
    <meta name="app-version" content="2.21.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <meta http-equiv="Pragma" content="no-cache">
    <title>C-Point</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#000000">
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="C-Point">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <script>
      // FOUC prevention: resolve the theme and sync every chrome surface
      // that must be correct on the very first paint, before React mounts.
      // Keep these maps in lockstep with META_THEME_COLOR in
      // client/src/contexts/ThemeContext.tsx and docs/LIGHT_MODE_TOKENS.md.
      (function() {
        var theme = 'dark';
        try {
          var stored = localStorage.getItem('cpoint:theme');
          if (stored === 'dark' || stored === 'light') {
            theme = stored;
          } else if (stored === 'system') {
            theme = (window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
              ? 'dark' : 'light';
          }
        } catch (e) { /* localStorage unavailable → keep dark default */ }
        try {
          var root = document.documentElement;
          root.dataset.theme = theme;
          root.style.colorScheme = theme;

          var themeColor = theme === 'light' ? '#FAFBFC' : '#000000';
          var setMeta = function (selector, attr, value) {
            var tag = document.querySelector(selector);
            if (tag) tag.setAttribute(attr, value);
          };
          setMeta('meta[name="theme-color"]', 'content', themeColor);
          setMeta('meta[name="color-scheme"]', 'content', theme);
          // iOS PWA status bar style cannot change at runtime; seed it from
          // the initial theme. `black-translucent` lets content extend under
          // the bar (dark canvas, light glyphs); `default` gives an opaque
          // light bar with dark glyphs for the light canvas.
          setMeta(
            'meta[name="apple-mobile-web-app-status-bar-style"]',
            'content',
            theme === 'light' ? 'default' : 'black-translucent'
          );
        } catch (e) { /* best-effort: ThemeProvider re-applies after mount */ }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        /* Default to env() so first paint already reflects the device safe area.
           The inline probe script below also writes resolved pixel values so
           getComputedStyle() based JS readers see a real number, not the env() token. */
        --sat-px: env(safe-area-inset-top, 0px);
        --sab-px: env(safe-area-inset-bottom, 0px);
        --sal-px: env(safe-area-inset-left, 0px);
        --sar-px: env(safe-area-inset-right, 0px);
      }
      
      :root[data-theme='light'] {
        color-scheme: light;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        overflow: hidden;
        background: #000000;
        color: #ffffff;
        color-scheme: dark;
      }
      
      #root {
        height: 100%;
        background: #000000;
      }

      /* Light-theme first-paint overrides: the FOUC script sets
         data-theme before paint, so the pre-React shell (body, #root, and
         the initial loader) must not flash the dark canvas for light users.
         !important is required to win over the loader's inline styles. */
      /* :root IS the html element, so target it directly — the previous
         ":root[data-theme='light'] html" descendant selector never matched
         and left html with the dark base color in light mode. */
      html[data-theme='light'],
      html[data-theme='light'] body {
        background: #FAFBFC;
        color: #1a1a1a;
        color-scheme: light;
      }
      :root[data-theme='light'] #root { background: #FAFBFC; }
      :root[data-theme='light'] #initial-loader { background: #FAFBFC !important; }
      :root[data-theme='light'] .initial-loader-text { color: rgba(0,0,0,0.6) !important; }
      :root[data-theme='light'] .initial-loader-spinner {
        border-color: rgba(0,0,0,0.12) !important;
        border-top-color: #00CEC8 !important;
      }
      
      /* Hide scrollbars but allow scrolling */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { display: none; width: 0; height: 0; }
      
      /* Prevent iOS text zoom on input focus */
      input, textarea, select { font-size: 16px !important; }
    </style>
    <!-- Font Awesome is now bundled via npm (@fortawesome/fontawesome-free) in main.tsx -->
    <script type="module" crossorigin src="/assets/index-vL5kaSJR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CFHemZgw.css">
      <link rel="modulepreload" href="/assets/index-vL5kaSJR.js">
  </head>
  <body>
    <!-- Outside #root so React createRoot() does not remove this until auth is ready -->
    <div id="initial-loader" style="
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000;
      z-index: 9999;
    ">
      <img src="/static/cpoint-logo.png" alt="C-Point" style="width: 80px; height: 80px; margin-bottom: 24px; border-radius: 16px; object-fit: contain;" />
      <div class="initial-loader-spinner" style="
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #00CEC8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
      <span class="initial-loader-text" style="margin-top: 12px; font-size: 14px; color: rgba(255,255,255,0.7); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Loading your dashboard…</span>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <div id="root" style="background-color: #000000;"></div>
    <script>
      /*
       * Safe-area probe — runs synchronously before the React bundle loads.
       *
       * Some browsers (notably WebKit) preserve env() as an unresolved token
       * inside an unregistered CSS custom property, so getComputedStyle().
       * getPropertyValue('--sab-px') returns the literal "env(...)" string and
       * parseFloat yields NaN. Chat composer hooks read these vars via JS
       * (readCssPxVar) during their useState initializer, so we must seed real
       * pixel values BEFORE React mounts. Otherwise safeBottomPx starts at 0,
       * the message list paints with the wrong inset, and a later resize /
       * visualViewport event re-syncs it — visible as messages drifting upward
       * after first paint in DM and group chat threads.
       *
       * This block is intentionally inline + IIFE so it cannot defer or fail
       * the rest of the boot. useSafeAreaSync() still runs after mount and
       * keeps the vars in sync on orientation / Capacitor resume.
       */
      (function () {
        try {
          var probe = document.createElement('div');
          probe.style.cssText =
            'position:fixed;top:0;right:0;bottom:0;left:0;width:0;height:0;' +
            'margin:0;border:0;visibility:hidden;pointer-events:none;z-index:-1;' +
            'padding-top:env(safe-area-inset-top,0px);' +
            'padding-right:env(safe-area-inset-right,0px);' +
            'padding-bottom:env(safe-area-inset-bottom,0px);' +
            'padding-left:env(safe-area-inset-left,0px);';
          document.body.appendChild(probe);
          var cs = getComputedStyle(probe);
          var top = parseFloat(cs.paddingTop) || 0;
          var right = parseFloat(cs.paddingRight) || 0;
          var bottom = parseFloat(cs.paddingBottom) || 0;
          var left = parseFloat(cs.paddingLeft) || 0;
          probe.remove();

          var ua = navigator.userAgent || '';
          var isIosDevice = /iPhone|iPod|iPad/i.test(ua);
          if (isIosDevice) {
            var maxSide = Math.max(screen.width, screen.height);
            var minSide = Math.min(screen.width, screen.height);
            var hasHomeIndicator = maxSide >= 812 && minSide >= 375;
            if (bottom < 1 && hasHomeIndicator) bottom = 34;
            if (top < 1 && hasHomeIndicator) {
              top = window.innerHeight >= 812 ? 47 : 20;
            }
          }

          var root = document.documentElement;
          root.style.setProperty('--sat-px', top + 'px');
          root.style.setProperty('--sab-px', bottom + 'px');
          root.style.setProperty('--sal-px', left + 'px');
          root.style.setProperty('--sar-px', right + 'px');
          root.style.setProperty('--sab', bottom + 'px');
          root.style.setProperty('--sat', top + 'px');
        } catch (e) { /* best-effort: useSafeAreaSync() will retry post-mount */ }
      })();
    </script>
  </body>
</html>
